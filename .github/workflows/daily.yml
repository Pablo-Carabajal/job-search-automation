name: Daily Job Search

on:
  schedule:
    - cron: '0 14 * * *'  # 11:00 AM Argentina (UTC-3)
  workflow_dispatch:       # Ejecución manual desde la UI

jobs:
  run-job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Selenium
        run: |
          sudo apt-get update -q
          sudo apt-get install -y chromium-browser

      - name: Create required directories
        run: |
          mkdir -p logs
          mkdir -p data
          mkdir -p assets

      - name: Download historial artifact (if exists)
        uses: actions/download-artifact@v4.2.1
        with:
          name: historial
          path: data/
        continue-on-error: true

      - name: Run job search
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOMBRE_REMITENTE: ${{ secrets.NOMBRE_REMITENTE }}
          CANDIDATO_EMAIL: ${{ secrets.CANDIDATO_EMAIL }}
          RUTA_CV: assets/cv.pdf
          RUTA_HISTORIAL: data/historial.db
          RUTA_BLACKLIST: data/blacklist.txt
          COOLDOWN_DIAS: "20"
          MAX_POSTULACIONES_DIA: "7"
          CATEGORIAS: "Producción / Operarios / Manufactura,Administración / Oficina,Almacén / Logística / Transporte,Ventas"
          COMPUTRABAJO_EMAIL: ${{ secrets.COMPUTRABAJO_EMAIL }}
          COMPUTRABAJO_PASSWORD: ${{ secrets.COMPUTRABAJO_PASSWORD }}
        run: python main.py

      - name: Upload historial artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: historial
          path: data/historial.db
          retention-days: 30
          overwrite: true
